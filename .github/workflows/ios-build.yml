name: iOS Build

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'common/config/**'
      - 'common/**/*.gradle.kts'
      - 'ios/src/**'
      - 'ios/config/**'
      - 'ios/**/*.gradle.kts'
      - 'ios/*.xcodeproj/**'

jobs:
  build-ios-debug:
    runs-on: macos-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v6

      # ── Node ────────────────────────────────────────────────────────────────
      - name: Install Node
        uses: ./.github/actions/install-node

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ── Gradle ──────────────────────────────────────────────────────────────
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x common/gradlew

      # ── Prepare for iOS build ───────────────────────────────────────────────
      - name: Install SCons
        if: env.ACT != 'true'
        run: pip install scons

      # ── Run iOS build ───────────────────────────────────────────────────────
      - name: Build iOS debug
        working-directory: common
        run: ./gradlew buildiOSDebug --no-daemon --stacktrace

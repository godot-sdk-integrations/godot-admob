name: Install ktlint
description: Installs a pinned version of ktlint and places it on PATH.

runs:
  using: composite

  steps:
    - name: Install ktlint
      shell: bash
      run: |
        KTLINT_VERSION="1.8.0"
        curl -sSLO "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint"
        chmod +x ktlint
        sudo mv ktlint /usr/local/bin/

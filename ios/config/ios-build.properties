#
# ios/config/ios-build.properties - extra properties and scripts for the :ios module.
# Read by BuildConfig.iosExtraProperties and BuildConfig.iosExtraGradle.
#

# -- Optional: extra properties ------------------------------------------------
#
# Keys with the `extra.` prefix are forwarded to the :ios project.extra.
# The prefix is stripped, so `extra.myProperty=value` becomes
# project.extra["myProperty"] = "value" inside :ios.
#
# Example:
#   extra.myProperty=value

# -- Optional: extra Gradle scripts -------------------------------------------
#
# Keys with the `gradle.` prefix are applied to :ios via project.apply(from = …).
# The value is a file path relative to the repo root (or absolute).
#
# Example:
#   gradle.extraGradle=ios/config/extra.gradle.kts

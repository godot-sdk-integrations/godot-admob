# gradle/config/build.properties - root build configuration read by BuildConfig.
#
# Per-module extra properties and extra Gradle scripts are configured in each
# module's own file:
#
#   addon/config/addon-build.properties       → BuildConfig.addonExtraProperties / addonExtraGradle
#   android/config/android-build.properties   → BuildConfig.androidExtraProperties / androidExtraGradle
#   ios/config/ios-build.properties           → BuildConfig.iosExtraProperties / iosExtraGradle
#

# ── Required ──────────────────────────────────────────────────────────────────

gradleProjectName=godot-admob-plugin

# ── Optional: root-project extra properties ───────────────────────────────────
#
# Keys with the `root.extra.` prefix are forwarded to the root project's
# project.extra.  The prefix is stripped, so `root.extra.myProp=value` becomes
# project.extra["myProp"] = "value" on the root project.
#
# Example:
#   root.extra.myProp=value

# ── Optional: root-project extra Gradle scripts ───────────────────────────────
#
# Keys with the `root.gradle.` prefix are applied to the root project via
# project.apply(from = …).  The value is a file path relative to the repo root
# (or absolute).
#
# Example:
#   root.gradle.myScript=config/my-extras.gradle.kts

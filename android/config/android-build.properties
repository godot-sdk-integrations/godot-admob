#
# android/config/android-build.properties - extra properties and scripts for the :android module.
# Read by BuildConfig.androidExtraProperties and BuildConfig.androidExtraGradle.
#

# -- Optional: extra properties ------------------------------------------------
#
# Keys with the `extra.` prefix are forwarded to the :android project.extra.
# The prefix is stripped, so `extra.myProperty=value` becomes
# project.extra["myProperty"] = "value" inside :android.
#
# Example:
#   extra.myProperty=value

# -- Optional: extra Gradle scripts -------------------------------------------
#
# Keys with the `gradle.` prefix are applied to :android via project.apply(from = …).
# The value is a file path relative to the repo root (or absolute).
#
# Example:
#   gradle.extraGradle=android/config/extra.gradle.kts
